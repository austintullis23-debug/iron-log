<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#0a1628">
<title>Iron Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a1628;color:#f0f4ff;font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:.03em;overscroll-behavior:none}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit;letter-spacing:.03em;color:#f0f4ff}
input:focus,select:focus{outline:none;border-color:#c9a84c!important}
button:active{opacity:.7;transform:scale(.97)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:2px}

.page{min-height:100vh;background:#0a1628;padding-bottom:85px}
.main{padding:14px;max-width:600px;margin:0 auto}
.card{background:#0d1f3c;border:1px solid #1e3560;border-radius:12px;padding:16px;margin-bottom:12px}
.hdr{background:#071020;border-bottom:2px solid #c9a84c;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-btns{display:flex;gap:8px}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-iron{font-size:20px;color:#c9a84c;letter-spacing:.2em}
.logo-log{font-size:11px;color:#f0f4ff;letter-spacing:.35em}

.bnav{position:fixed;bottom:0;left:0;right:0;background:#071020;border-top:1px solid #c9a84c;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px 7px;background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.08em;gap:3px;color:#6b82a8}
.bnav-btn.on{color:#c9a84c}
.bnav-ico{font-size:18px;line-height:1}

.big-btn{background:linear-gradient(135deg,#c9a84c,#b8922a);color:#0a1628;border:none;padding:16px 20px;font-size:17px;font-family:inherit;letter-spacing:.15em;cursor:pointer;display:block;width:100%;border-radius:10px;margin-bottom:8px}
.out-btn{background:transparent;border:1px solid #c9a84c;color:#c9a84c;padding:8px 12px;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.08em;border-radius:6px;min-height:36px}
.out-btn.red{border-color:#e05555;color:#e05555}
.out-btn.gray{border-color:#6b82a8;color:#6b82a8}

.lbl{font-size:11px;color:#6b82a8;margin-bottom:4px;letter-spacing:.1em;display:block}
.inp{background:#071020;border:1px solid #1e3560;color:#f0f4ff;padding:11px 13px;font-family:inherit;font-size:16px!important;width:100%;border-radius:8px}
.sel{background:#071020;border:1px solid #1e3560;color:#f0f4ff;padding:11px 13px;font-family:inherit;font-size:16px!important;width:100%;border-radius:8px;cursor:pointer}
select option{background:#0d1f3c}

.sec{font-size:19px;color:#c9a84c;letter-spacing:.2em;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.flex{display:flex;align-items:center}
.flex-sb{display:flex;justify-content:space-between;align-items:center}
.flex-g{display:flex;gap:8px;align-items:center}
.muted{color:#6b82a8}
.gold{color:#c9a84c}
.center{text-align:center}

.set-row{display:grid;grid-template-columns:28px 70px 70px 1fr auto;gap:6px;align-items:center;margin-bottom:7px}
.bp-tag{font-size:10px;padding:2px 6px;letter-spacing:.08em;display:inline-block;border-radius:3px;color:#0a1628;white-space:nowrap}
.divider{border-top:1px solid #1e3560;padding-top:8px;margin-top:8px}
.ex-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0}
.last-perf{margin-top:10px;padding-top:10px;border-top:1px dashed #1e3560}
.pct-row{display:flex;justify-content:space-between;padding:5px 7px;background:#071020;border-radius:5px;font-size:12px;margin-bottom:3px}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1628">
    <div style="font-size:24px;color:#c9a84c;letter-spacing:.2em">IRON LOG</div>
    <div style="font-size:12px;color:#6b82a8;margin-top:8px;letter-spacing:.2em">LOADING...</div>
  </div>
</div>
<script>
"use strict";

// ── Data ─────────────────────────────────────────────────────────────────────
var BP = ["Chest","Back","Shoulders","Biceps","Triceps","Legs","Core","Full Body"];
var EX = {
  Chest:["Bench Press","Incline Bench Press","Decline Bench Press","Dumbbell Fly","Push Up","Cable Fly","Dips"],
  Back:["Deadlift","Pull Up","Barbell Row","Lat Pulldown","Seated Cable Row","T-Bar Row","Face Pull"],
  Shoulders:["Overhead Press","Lateral Raise","Front Raise","Arnold Press","Rear Delt Fly","Shrugs"],
  Biceps:["Barbell Curl","Dumbbell Curl","Hammer Curl","Preacher Curl","Cable Curl","Concentration Curl"],
  Triceps:["Tricep Pushdown","Skull Crusher","Close Grip Bench","Overhead Extension","Dips","Kickback"],
  Legs:["Squat","Romanian Deadlift","Leg Press","Lunges","Leg Curl","Leg Extension","Calf Raise","Hip Thrust"],
  Core:["Plank","Crunches","Russian Twist","Leg Raise","Ab Wheel","Cable Crunch","Dead Bug"],
  "Full Body":["Clean and Jerk","Snatch","Thruster","Burpee","Kettlebell Swing","Man Maker"]
};
var BPC = {Chest:"#e8b4b8",Back:"#7fb3d3",Shoulders:"#b8a0d4",Biceps:"#e8a0b8",Triceps:"#d4a0b8",Legs:"#e8d48a",Core:"#8ad4b8","Full Body":"#a0c4e8"};

// ── State ────────────────────────────────────────────────────────────────────
var S = {
  view:"home", workouts:[], templates:[], workout:null,
  openEx:null, openTplEx:null, editTpl:null,
  progEx:"", ormW:"", ormR:"", ormEx:"", loaded:false
};

// ── Storage ──────────────────────────────────────────────────────────────────
function openDB(cb) {
  var r = indexedDB.open("IronLog2",1);
  r.onupgradeneeded = function(e){e.target.result.createObjectStore("kv");};
  r.onsuccess = function(e){cb(null,e.target.result);};
  r.onerror = function(){cb(r.error);};
}
function dbGet(key,cb) {
  openDB(function(err,db){
    if(err){cb(null);return;}
    var tx=db.transaction("kv","readonly");
    var r=tx.objectStore("kv").get(key);
    r.onsuccess=function(){cb(r.result);};
    r.onerror=function(){cb(null);};
  });
}
function dbSet(key,val) {
  openDB(function(err,db){
    if(err)return;
    var tx=db.transaction("kv","readwrite");
    tx.objectStore("kv").put(val,key);
  });
}
function loadData() {
  dbGet("workouts",function(w){
    if(w) S.workouts=w;
    dbGet("templates",function(t){
      if(t) S.templates=t;
      S.loaded=true;
      render();
    });
  });
}
function save(){
  if(!S.loaded) return;
  dbSet("workouts",S.workouts);
  dbSet("templates",S.templates);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function uid(){return ""+Date.now()+Math.floor(Math.random()*10000);}
function esc(s){return (""+( s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function nw(){return {id:uid(),date:new Date().toISOString().slice(0,10),name:"",bodyWeight:"",exercises:[]};}
function ne(bp){bp=bp||"Chest";return {id:uid(),bodyPart:bp,name:EX[bp][0],customName:"",sets:[]};}
function ns(){return {id:uid(),weight:"",reps:"",comment:""};}
function ntpl(){return {id:uid(),name:"New Template",exercises:[]};}

function bpTag(bp){
  return '<span class="bp-tag" style="background:'+(BPC[bp]||"#666")+'">'+esc(bp)+'</span>';
}

function calc1rm(w,r){
  w=parseFloat(w); r=parseInt(r);
  if(!w||!r||r<1||isNaN(w)||isNaN(r)) return null;
  if(r===1) return {e:w,b:w,l:w,m:w,avg:w};
  var e=Math.round(w*(1+r/30));
  var b=Math.round(w*(36/(37-r)));
  var lv=Math.round(w*Math.pow(r,0.10));
  var m=Math.round(100*w/(52.2+41.9*Math.exp(-0.055*r)));
  return {e:e,b:b,l:lv,m:m,avg:Math.round((e+b+lv+m)/4)};
}

function lastPerf(exName){
  var cur=S.workout?S.workout.id:null;
  var best=null, bestDate=null;
  for(var i=0;i<S.workouts.length;i++){
    var w=S.workouts[i];
    if(w.id===cur) continue;
    for(var j=0;j<w.exercises.length;j++){
      var ex=w.exercises[j];
      if((ex.customName||ex.name)===exName){
        if(!bestDate||w.date>bestDate){bestDate=w.date;best={date:w.date,sets:ex.sets};}
      }
    }
  }
  return best;
}

function best1rm(exName){
  var top=null;
  for(var i=0;i<S.workouts.length;i++){
    var w=S.workouts[i];
    for(var j=0;j<w.exercises.length;j++){
      var ex=w.exercises[j];
      if((ex.customName||ex.name)!==exName) continue;
      for(var k=0;k<ex.sets.length;k++){
        var est=calc1rm(ex.sets[k].weight,ex.sets[k].reps);
        if(est&&(!top||est.avg>top.orm.avg)) top={orm:est,weight:parseFloat(ex.sets[k].weight),reps:parseInt(ex.sets[k].reps),date:w.date};
      }
    }
  }
  return top;
}

function progData(name){
  var pts=[];
  var sorted=S.workouts.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  for(var i=0;i<sorted.length;i++){
    var w=sorted[i];
    for(var j=0;j<w.exercises.length;j++){
      var ex=w.exercises[j];
      if((ex.customName||ex.name)!==name) continue;
      var vol=0,wt=0;
      for(var k=0;k<ex.sets.length;k++){
        var s=ex.sets[k];
        if(s.weight&&s.reps){var v=parseFloat(s.weight)*parseInt(s.reps);if(v>vol)vol=v;if(parseFloat(s.weight)>wt)wt=parseFloat(s.weight);}
      }
      if(vol>0) pts.push({date:w.date,volume:vol,weight:wt});
    }
  }
  return pts;
}

function getPR(ex,idx,wid){
  var s=ex.sets[idx];
  if(!s.weight||!s.reps) return null;
  var vol=parseFloat(s.weight)*parseInt(s.reps), best=0;
  for(var i=0;i<S.workouts.length;i++){
    var w=S.workouts[i];
    if(w.id===wid) continue;
    for(var j=0;j<w.exercises.length;j++){
      var e=w.exercises[j];
      if(e.name!==ex.name) continue;
      for(var k=0;k<e.sets.length;k++){
        var t=e.sets[k];
        if(t.weight&&t.reps) best=Math.max(best,parseFloat(t.weight)*parseInt(t.reps));
      }
    }
  }
  if(best===0) return null;
  if(vol>best) return "PR";
  if((vol-best)/best>=-0.05) return "~";
  return null;
}

function miniChart(pts){
  if(pts.length<2) return "";
  var W=180,H=44,pad=5;
  var vols=pts.map(function(p){return p.volume;});
  var mn=Math.min.apply(null,vols),mx=Math.max.apply(null,vols),rng=mx-mn||1;
  var points=pts.map(function(p,i){
    return (pad+(i/(pts.length-1))*(W-pad*2)).toFixed(1)+","+(H-pad-((p.volume-mn)/rng)*(H-pad*2)).toFixed(1);
  });
  var up=vols[vols.length-1]>=vols[0];
  var col=up?"#c9a84c":"#e05555";
  var dots=pts.map(function(p,i){var xy=points[i].split(",");return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="3" fill="'+col+'"/>';}).join("");
  return '<svg width="'+W+'" height="'+H+'" style="display:block;overflow:visible"><polyline points="'+points.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="2"/>'+dots+'</svg>';
}

// ── SVG barbell ───────────────────────────────────────────────────────────────
function barbell(sz){
  sz=sz||36;
  var W=sz*2.2,H=sz,cy=H/2;
  var shY=cy-sz*.055,shH=sz*.11;
  var cW=sz*.09,cH=sz*.42,cY=cy-cH/2;
  var lcX=sz*.32,rcX=W-lcX-cW;
  var p1W=sz*.11,p1H=sz*.78,p2W=sz*.09,p2H=sz*.62;
  var lp1=lcX-p1W,lp2=lp1-p2W,rp1=rcX+cW,rp2=rp1+p1W;
  var capW=sz*.055,capH=sz*.28;
  var kn=[.44,.46,.48,.50,.52,.54,.56].map(function(p){return '<line x1="'+(W*p).toFixed(1)+'" y1="'+(shY+1).toFixed(1)+'" x2="'+(W*p).toFixed(1)+'" y2="'+(shY+shH-1).toFixed(1)+'" stroke="#9098b0" stroke-width="'+(sz*.012).toFixed(1)+'" opacity=".5"/>';}).join("");
  return '<svg width="'+W.toFixed(1)+'" height="'+H+'" viewBox="0 0 '+W.toFixed(1)+' '+H+'" style="display:block">'+
    '<defs><linearGradient id="bsg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4d4e0"/><stop offset="40%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#8890a8"/></linearGradient>'+
    '<linearGradient id="bpg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c87a"/><stop offset="50%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#a07830"/></linearGradient>'+
    '<linearGradient id="bcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c87a"/><stop offset="100%" stop-color="#a07830"/></linearGradient></defs>'+
    '<rect x="'+lp2.toFixed(1)+'" y="'+shY.toFixed(1)+'" width="'+(W-lp2*2+sz*.01).toFixed(1)+'" height="'+shH.toFixed(1)+'" rx="'+(shH/2).toFixed(1)+'" fill="url(#bsg)"/>'+
    '<rect x="'+lp2.toFixed(1)+'" y="'+(cy-p2H/2).toFixed(1)+'" width="'+p2W.toFixed(1)+'" height="'+p2H.toFixed(1)+'" rx="'+(sz*.018).toFixed(1)+'" fill="url(#bpg)"/>'+
    '<rect x="'+lp1.toFixed(1)+'" y="'+(cy-p1H/2).toFixed(1)+'" width="'+p1W.toFixed(1)+'" height="'+p1H.toFixed(1)+'" rx="'+(sz*.022).toFixed(1)+'" fill="url(#bpg)"/>'+
    '<rect x="'+rp1.toFixed(1)+'" y="'+(cy-p1H/2).toFixed(1)+'" width="'+p1W.toFixed(1)+'" height="'+p1H.toFixed(1)+'" rx="'+(sz*.022).toFixed(1)+'" fill="url(#bpg)"/>'+
    '<rect x="'+rp2.toFixed(1)+'" y="'+(cy-p2H/2).toFixed(1)+'" width="'+p2W.toFixed(1)+'" height="'+p2H.toFixed(1)+'" rx="'+(sz*.018).toFixed(1)+'" fill="url(#bpg)"/>'+
    '<rect x="'+lcX.toFixed(1)+'" y="'+cY.toFixed(1)+'" width="'+cW.toFixed(1)+'" height="'+cH.toFixed(1)+'" rx="'+(sz*.018).toFixed(1)+'" fill="url(#bcg)"/>'+
    '<rect x="'+rcX.toFixed(1)+'" y="'+cY.toFixed(1)+'" width="'+cW.toFixed(1)+'" height="'+cH.toFixed(1)+'" rx="'+(sz*.018).toFixed(1)+'" fill="url(#bcg)"/>'+
    '<rect x="'+(lp2-capW).toFixed(1)+'" y="'+(cy-capH/2).toFixed(1)+'" width="'+capW.toFixed(1)+'" height="'+capH.toFixed(1)+'" rx="'+(sz*.014).toFixed(1)+'" fill="#a07830"/>'+
    '<rect x="'+(rp2+p2W).toFixed(1)+'" y="'+(cy-capH/2).toFixed(1)+'" width="'+capW.toFixed(1)+'" height="'+capH.toFixed(1)+'" rx="'+(sz*.014).toFixed(1)+'" fill="#a07830"/>'+
    kn+'</svg>';
}

function logoHtml(){
  return '<div class="hdr-left">'+barbell(28)+'<div class="logo-text"><span class="logo-iron">IRON</span><span class="logo-log">LOG</span></div></div>';
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function navHtml(){
  var tabs=[{v:"home",i:"🏠",l:"HOME"},{v:"log",i:"➕",l:"LOG"},{v:"history",i:"📋",l:"HISTORY"},{v:"progress",i:"📈",l:"PROGRESS"},{v:"orm",i:"🏆",l:"1RM"},{v:"templates",i:"⚡",l:"TEMPLATES"}];
  return '<nav class="bnav">'+tabs.map(function(t){
    return '<button class="bnav-btn'+(S.view===t.v?" on":"'")+' onclick="go(\''+t.v+'\')"><span class="bnav-ico">'+t.i+'</span><span>'+t.l+'</span></button>';
  }).join("")+'</nav>';
}

// ── Exercise card ─────────────────────────────────────────────────────────────
function exCard(ex,openId,wid,isTpl){
  var open=openId===ex.id;
  var body="";
  if(open){
    var bpOpts=BP.map(function(b){return '<option'+(b===ex.bodyPart?' selected':'')+'>'+b+'</option>';}).join("");
    var exOpts=EX[ex.bodyPart].map(function(n){return '<option'+(n===ex.name?' selected':'')+'>'+esc(n)+'</option>';}).join("");
    var ti=isTpl?"true":"false";
    var setRows="";
    if(!isTpl){
      setRows+='<div class="set-row" style="margin-bottom:4px"><div class="lbl center" style="margin:0">SET</div><div class="lbl" style="margin:0">LBS</div><div class="lbl" style="margin:0">REPS</div><div class="lbl" style="margin:0">NOTES</div><div></div></div>';
    }
    for(var i=0;i<ex.sets.length;i++){
      var s=ex.sets[i];
      var badge='<span class="muted" style="font-size:11px;display:block;text-align:center">'+(i+1)+'</span>';
      if(!isTpl){
        var pr=getPR(ex,i,wid);
        if(pr==="PR") badge='<span style="background:#c9a84c;color:#0a1628;font-size:9px;padding:1px 4px;border-radius:2px;font-weight:bold;display:block;text-align:center">PR</span>';
        else if(pr==="~") badge='<span style="background:#fff;color:#0a1628;font-size:9px;padding:1px 4px;border-radius:2px;font-weight:bold;display:block;text-align:center">~</span>';
      }
      setRows+='<div class="set-row">'+
        '<div>'+badge+'</div>'+
        '<input class="inp" type="number" inputmode="decimal" placeholder="lbs" value="'+esc(s.weight)+'" oninput="us(\''+ex.id+'\',\''+s.id+'\',\'weight\',this.value,'+ti+')"/>'+
        '<input class="inp" type="number" inputmode="numeric" placeholder="reps" value="'+esc(s.reps)+'" oninput="us(\''+ex.id+'\',\''+s.id+'\',\'reps\',this.value,'+ti+')"/>'+
        (isTpl?'<div></div>':'<input class="inp" placeholder="notes" value="'+esc(s.comment)+'" oninput="us(\''+ex.id+'\',\''+s.id+'\',\'comment\',this.value,false)"/>')+
        '<button class="out-btn red" onclick="rs(\''+ex.id+'\',\''+s.id+'\','+ti+')">✕</button>'+
      '</div>';
    }
    var lp="";
    if(!isTpl){
      var perf=lastPerf(ex.customName||ex.name);
      if(perf){
        var perfRows=perf.sets.map(function(s,i){
          return '<div style="display:flex;gap:10px;font-size:12px;color:#c8d4e8;padding:3px 0">'+
            '<span class="muted" style="min-width:38px">SET '+(i+1)+'</span>'+
            '<span>'+(s.weight||"—")+' lbs</span><span style="color:#6b82a8">×</span><span>'+(s.reps||"—")+' reps</span>'+
            (s.comment?'<span style="color:#5566aa;font-style:italic;font-family:Georgia,serif;font-size:11px">"'+esc(s.comment)+'"</span>':'')+
          '</div>';
        }).join("");
        lp='<div class="last-perf">'+
          '<div style="font-size:10px;color:#c9a84c;letter-spacing:.12em;margin-bottom:6px">LAST SESSION — '+esc(perf.date)+'</div>'+
          perfRows+'</div>';
      }
    }
    body='<div style="margin-top:12px">'+
      '<div class="g2" style="margin-bottom:10px">'+
        '<div><span class="lbl">BODY PART</span><select class="sel" onchange="ue(\''+ex.id+'\',\'bodyPart\',this.value,'+ti+')">'+bpOpts+'</select></div>'+
        '<div><span class="lbl">EXERCISE</span><select class="sel" onchange="ue(\''+ex.id+'\',\'name\',this.value,'+ti+')">'+exOpts+'</select></div>'+
      '</div>'+
      '<div style="margin-bottom:10px"><span class="lbl">CUSTOM NAME (OPTIONAL)</span><input class="inp" placeholder="Override name..." value="'+esc(ex.customName)+'" oninput="ue(\''+ex.id+'\',\'customName\',this.value,'+ti+')"/></div>'+
      (isTpl?'<span class="lbl">TARGET SETS (edit weights when logging)</span>':'')+
      setRows+
      '<button class="out-btn" style="margin-top:6px" onclick="as(\''+ex.id+'\','+ti+')">+ ADD SET</button>'+
      lp+
    '</div>';
  }
  return '<div class="card">'+
    '<div class="ex-hdr" onclick="te(\''+ex.id+'\','+(isTpl?'true':'false')+')">'+
      '<div class="flex-g" style="flex:1;overflow:hidden">'+bpTag(ex.bodyPart)+'<span style="font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:4px">'+esc(ex.customName||ex.name)+'</span></div>'+
      '<div class="flex-g" style="flex-shrink:0">'+
        '<span class="muted" style="font-size:11px">'+ex.sets.length+' SETS</span>'+

    bwSec='<div class="card"><div class="sec">BODYWEIGHT</div>'+

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  if(!app) return;
  if(!S.loaded){app.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1628"><div style="font-size:24px;color:#c9a84c;letter-spacing:.2em">IRON LOG</div><div style="font-size:12px;color:#6b82a8;margin-top:8px;letter-spacing:.2em">LOADING...</div></div>';return;}
  try{
    var html="";
    if(S.view==="home")      html=vHome();
    else if(S.view==="log")  html=vLog();
    else if(S.view==="history") html=vHistory();
    else if(S.view==="progress") html=vProgress();
    else if(S.view==="orm")  html=vORM();
    else if(S.view==="templates") html=vTemplates();
    else html=vHome();
    app.innerHTML=html;
  }catch(err){
    app.innerHTML='<div style="padding:20px;color:#e05555;font-family:monospace;font-size:13px">ERROR: '+esc(err.message)+'<br><pre>'+esc(err.stack)+'</pre></div>';
    console.error(err);
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
function go(v){
  if(v==="log"){startBlank();return;}
  S.view=v;render();
}

function startBlank(){
  var w=nw(); w.name="Workout "+(S.workouts.length+1);
  S.workout=w; S.view="log"; S.openEx=null; render();
}

function startTpl(id){
  var t=null;
  for(var i=0;i<S.templates.length;i++){if(S.templates[i].id==id){t=S.templates[i];break;}}
  if(!t) return;
  var w=nw(); w.name=t.name;
  w.exercises=t.exercises.map(function(e){
    return {id:uid(),bodyPart:e.bodyPart,name:e.name,customName:e.customName,
      sets:e.sets.map(function(){return ns();})};
  });
  S.workout=w; S.view="log";
  S.openEx=w.exercises.length?w.exercises[0].id:null;
  render();
}

function cancelWo(){S.workout=null;S.view="home";render();}

function saveWo(){
  var wo=S.workout; if(!wo) return;
  var idx=-1;
  for(var i=0;i<S.workouts.length;i++){if(S.workouts[i].id===wo.id){idx=i;break;}}
  if(idx>=0) S.workouts[idx]=wo; else S.workouts.unshift(wo);
  save(); S.workout=null; S.view="home"; render();
}

function dw(id){
  S.workouts=S.workouts.filter(function(w){return w.id!=id;});
  save(); render();
}

function uw(f,v){if(S.workout) S.workout[f]=v;}

function ae(){
  var ex=ne(); S.workout.exercises.push(ex); S.openEx=ex.id; render();
}

function te(id,isTpl){
  if(isTpl) S.openTplEx=S.openTplEx===id?null:id;
  else S.openEx=S.openEx===id?null:id;
  render();
}

function re(id,isTpl){
  if(isTpl) S.editTpl.exercises=S.editTpl.exercises.filter(function(e){return e.id!=id;});
  else S.workout.exercises=S.workout.exercises.filter(function(e){return e.id!=id;});
  render();
}

function ue(id,field,val,isTpl){
  var list=isTpl?S.editTpl.exercises:S.workout.exercises;
  var ex=null; for(var i=0;i<list.length;i++){if(list[i].id==id){ex=list[i];break;}}
  if(!ex) return;
  if(field==="bodyPart"){ex.bodyPart=val;ex.name=EX[val][0];render();}
  else{ex[field]=val;if(field==="name")render();}
}

function as(exId,isTpl){
  var list=isTpl?S.editTpl.exercises:S.workout.exercises;
  for(var i=0;i<list.length;i++){if(list[i].id==exId){list[i].sets.push(ns());break;}}
  render();
}

function rs(exId,setId,isTpl){
  var list=isTpl?S.editTpl.exercises:S.workout.exercises;
  for(var i=0;i<list.length;i++){if(list[i].id==exId){list[i].sets=list[i].sets.filter(function(s){return s.id!=setId;});break;}}
  render();
}

function us(exId,setId,field,val,isTpl){
  var list=isTpl?S.editTpl.exercises:S.workout.exercises;
  for(var i=0;i<list.length;i++){
    if(list[i].id==exId){
      for(var j=0;j<list[i].sets.length;j++){
        if(list[i].sets[j].id==setId){list[i].sets[j][field]=val;break;}
      }
      break;
    }
  }
}

function spx(v){S.progEx=v;render();}
function sorm(f,v){if(f==="w")S.ormW=v;else if(f==="r")S.ormR=v;else S.ormEx=v;render();}

function newTpl(){var t=ntpl();S.templates.unshift(t);S.editTpl=t;S.openTplEx=null;render();}
function editTpl(id){for(var i=0;i<S.templates.length;i++){if(S.templates[i].id==id){S.editTpl=S.templates[i];break;}}S.openTplEx=null;render();}
function cancelTpl(){S.editTpl=null;render();}
function saveTpl(){
  var t=S.editTpl; if(!t) return;
  var idx=-1; for(var i=0;i<S.templates.length;i++){if(S.templates[i].id===t.id){idx=i;break;}}
  if(idx>=0) S.templates[idx]=t; else S.templates.unshift(t);
  save(); S.editTpl=null; render();
}
function deleteTpl(id){S.templates=S.templates.filter(function(t){return t.id!=id;});save();render();}
function utpl(f,v){if(S.editTpl) S.editTpl[f]=v;}
function atplEx(){var ex=ne();S.editTpl.exercises.push(ex);S.openTplEx=ex.id;render();}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
loadData();
</script>
