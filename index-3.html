// ── Storage (IndexedDB) ──────────────────────────────────────────────────────
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("IronLogDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readonly");
    const req = tx.objectStore("kv").get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(value, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const uid = () => Date.now() + Math.random();
const newWorkout = () => ({ id: uid(), date: new Date().toISOString().split("T")[0], name: "", bodyWeight: "", exercises: [] });
const newExercise = (bp = "Chest") => ({ id: uid(), bodyPart: bp, name: EXERCISES[bp][0], customName: "", sets: [] });
const newSet = () => ({ id: uid(), weight: "", reps: "", comment: "" });
const newTemplate = () => ({ id: uid(), name: "New Template", exercises: [] });

function getPRBadge(ex, setIdx, allWorkouts, curId) {
  const s = ex.sets[setIdx];
  if (!s.weight || !s.reps) return null;
  const vol = parseFloat(s.weight) * parseInt(s.reps);
  let best = 0;
  for (const w of allWorkouts) {
    if (w.id === curId) continue;
    for (const e of w.exercises) {
      if (e.name === ex.name || (ex.customName && e.customName === ex.customName)) {
        for (const t of e.sets) {
          if (t.weight && t.reps) best = Math.max(best, parseFloat(t.weight) * parseInt(t.reps));
        }
      }
    }
  }
  if (best === 0) return null;
  if (vol > best) return "PR";
  if ((vol - best) / best >= -0.05) return "~";
  return null;
}

function getProgressData(name, workouts) {
  const pts = [];
  for (const w of [...workouts].sort((a,b) => new Date(a.date)-new Date(b.date))) {
    for (const ex of w.exercises) {
      if ((ex.customName || ex.name) === name) {
        let vol = 0, wt = 0;
        for (const s of ex.sets) {
          if (s.weight && s.reps) {
            vol = Math.max(vol, parseFloat(s.weight)*parseInt(s.reps));
            wt  = Math.max(wt, parseFloat(s.weight));
          }
        }
        if (vol > 0) pts.push({ date: w.date, volume: vol, weight: wt, name: w.name });
      }
    }
  }
  return pts;
}

// ── SVG Components ───────────────────────────────────────────────────────────
function BarbellSVG({ size = 40 }) {
  const gold="#c9a84c", gd="#a07830", gl="#e8c87a";
  const W=size*2.2, H=size, cy=H/2;
  const shY=cy-size*0.055, shH=size*0.11;
  const cW=size*0.09, cH=size*0.42, cY=cy-cH/2;
  const lcX=size*0.32, rcX=W-lcX-cW;
  const p1W=size*0.11, p1H=size*0.78, p2W=size*0.09, p2H=size*0.62;
  const lp1=lcX-p1W, lp2=lp1-p2W, rp1=rcX+cW, rp2=rp1+p1W;
  const capW=size*0.055, capH=size*0.28;
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#d4d4e0"/><stop offset="40%" stopColor="#f0f4ff"/><stop offset="100%" stopColor="#8890a8"/>
        </linearGradient>
        <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={gl}/><stop offset="50%" stopColor={gold}/><stop offset="100%" stopColor={gd}/>
        </linearGradient>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={gl}/><stop offset="100%" stopColor={gd}/>
        </linearGradient>
      </defs>
      <rect x={lp2} y={shY} width={W-lp2*2+size*0.01} height={shH} rx={shH/2} fill="url(#sg)"/>
      <rect x={lp2} y={cy-p2H/2} width={p2W} height={p2H} rx={size*0.018} fill="url(#pg)"/>
      <rect x={lp1} y={cy-p1H/2} width={p1W} height={p1H} rx={size*0.022} fill="url(#pg)"/>
      <rect x={rp1} y={cy-p1H/2} width={p1W} height={p1H} rx={size*0.022} fill="url(#pg)"/>
      <rect x={rp2} y={cy-p2H/2} width={p2W} height={p2H} rx={size*0.018} fill="url(#pg)"/>
      <rect x={lcX} y={cY} width={cW} height={cH} rx={size*0.018} fill="url(#cg)"/>
      <rect x={rcX} y={cY} width={cW} height={cH} rx={size*0.018} fill="url(#cg)"/>
      <rect x={lp2-capW} y={cy-capH/2} width={capW} height={capH} rx={size*0.014} fill={gd}/>
      <rect x={rp2+p2W} y={cy-capH/2} width={capW} height={capH} rx={size*0.014} fill={gd}/>
      {[0.44,0.46,0.48,0.50,0.52,0.54,0.56].map((p,i)=>(
        <line key={i} x1={W*p} y1={shY+1} x2={W*p} y2={shY+shH-1} stroke="#9098b0" strokeWidth={size*0.012} opacity="0.5"/>
      ))}
    </svg>
  );
}

function MiniChart({ data }) {
  if (data.length < 2) return null;
  const W=200, H=56, pad=8;
  const vols=data.map(d=>d.volume);
  const mn=Math.min(...vols), mx=Math.max(...vols), rng=mx-mn||1;
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(W-pad*2);
    const y=H-pad-((d.volume-mn)/rng)*(H-pad*2);
    return `${x},${y}`;
  });
  const up=vols[vols.length-1]>vols[0];
  return (
    <svg width={W} height={H} style={{overflow:"visible",display:"block"}}>
      <polyline points={pts.join(" ")} fill="none" stroke={up?"#c9a84c":"#e05555"} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((d,i)=>{const[x,y]=pts[i].split(",").map(Number);return <circle key={i} cx={x} cy={y} r="3" fill={up?"#c9a84c":"#e05555"}/>;})}
    </svg>
  );
}

    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",padding:"2px 0"}}
           onClick={onToggle}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1,minWidth:0}}>

          <span style={{fontSize:"16px",letterSpacing:"0.08em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {ex.customName||ex.name}

        </div>
        <div style={{display:"flex",gap:"6px",alignItems:"center",flexShrink:0}}>
          <span style={{color:"#6b82a8",fontSize:"11px"}}>{sets.length} SETS</span>
          <button style={S.outlineBtn("#e05555")}

        <div style={{marginTop:"14px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
            <div><span style={S.label}>BODY PART</span>

                {BODY_PARTS.map(bp=><option key={bp}>{bp}</option>)}

            </div>
            <div><span style={S.label}>EXERCISE</span>
              <select style={S.select} value={ex.name}
                      onChange={e=>onUpdate("name",e.target.value)}>
                {EXERCISES[ex.bodyPart].map(n=><option key={n}>{n}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:"10px"}}>

          </div>
          {!isTemplate && (
            <div style={{display:"grid",gridTemplateColumns:"28px 72px 72px 1fr auto",gap:"6px",marginBottom:"6px"}}>
              {["SET","LBS","REPS","NOTES",""].map((h,i)=>(
                <div key={i} style={{fontSize:"10px",color:"#6b82a8",letterSpacing:"0.08em"}}>{h}</div>

            return (
              <div key={s.id} style={S.setRow}>
                <div style={{color:"#6b82a8",fontSize:"11px",textAlign:"center"}}>

                       placeholder="0" value={s.weight}

                <input style={S.input} type="number" inputMode="numeric"
                       placeholder="0" value={s.reps}

function LogView({ workout, setWorkout, workouts, onSave, onCancel }) {
  const [expandedEx, setExpandedEx] = useState(null);

  const updEx = (exId, field, value) => setWorkout(p=>({...p,
    exercises:p.exercises.map(e=>e.id===exId
      ? (field==="bodyPart" ? {...e,bodyPart:value,name:EXERCISES[value][0]} : {...e,[field]:value})
      : e)}));
  const remEx = id => setWorkout(p=>({...p,exercises:p.exercises.filter(e=>e.id!==id)}));
  const addEx = () => { const e=newExercise(); setWorkout(p=>({...p,exercises:[...p.exercises,e]})); setExpandedEx(e.id); };

// ── 1RM Formulas ─────────────────────────────────────────────────────────────
// All major formulas — we show all and highlight the average
function calc1RM(weight, reps) {
  if (!weight || !reps || reps < 1) return null;
  const w = parseFloat(weight), r = parseInt(reps);
  if (isNaN(w) || isNaN(r) || r < 1) return null;
  if (r === 1) return { epley:w, brzycki:w, lombardi:w, mayhew:w, avg:w };
  return {
    epley:    Math.round(w * (1 + r / 30)),
    brzycki:  Math.round(w * (36 / (37 - r))),
    lombardi: Math.round(w * Math.pow(r, 0.10)),
    mayhew:   Math.round((100 * w) / (52.2 + 41.9 * Math.exp(-0.055 * r))),
    get avg() { return Math.round((this.epley + this.brzycki + this.lombardi + this.mayhew) / 4); }
  };
}

// For a given exercise across all workouts, find the set that produces the highest estimated 1RM
function getBest1RM(exName, workouts) {
  let best = null;
  for (const w of workouts) {
    for (const ex of w.exercises) {
      if ((ex.customName || ex.name) !== exName) continue;
      for (const s of ex.sets) {
        if (!s.weight || !s.reps) continue;
        const est = calc1RM(s.weight, s.reps);
        if (!est) continue;
        if (!best || est.avg > best.orm.avg) {
          best = { orm: est, weight: parseFloat(s.weight), reps: parseInt(s.reps), date: w.date, workoutName: w.name };
        }
      }
    }
  }
  return best;
}

          <select style={{...S.select,marginBottom:"12px"}} value={selEx}
                  onChange={e=>setSelEx(e.target.value)}>
            <option value="">-- Choose an exercise --</option>
            {allNames.map(n=><option key={n}>{n}</option>)}
          </select>
          {selEx && !exBest && (
            <div style={{color:"#6b82a8",fontSize:"12px",textAlign:"center",padding:"10px",
                         fontFamily:"Georgia,serif",letterSpacing:0}}>
              No sets with weight and reps logged yet for this exercise.
            </div>
          )}
          {exBest && (
            <>
              <div style={{textAlign:"center",padding:"14px 0 8px",borderTop:"1px solid #1e3560"}}>
                <div style={{fontSize:"11px",color:"#6b82a8",letterSpacing:"0.15em",marginBottom:"4px"}}>
                  ESTIMATED 1RM FOR {selEx.toUpperCase()}
                </div>
                <div style={{fontSize:"52px",color:"#c9a84c",lineHeight:1,
                             textShadow:"0 0 24px rgba(201,168,76,0.4)"}}>
                  {exBest.orm.avg}
                </div>
                <div style={{fontSize:"12px",color:"#6b82a8",marginTop:"4px"}}>LBS</div>
                <div style={{fontSize:"11px",color:"#6b82a8",marginTop:"6px",
                             fontFamily:"Georgia,serif",letterSpacing:0}}>
                  Based on {exBest.weight} lbs × {exBest.reps} reps on {exBest.date}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"6px",marginTop:"10px"}}>
                {[
                  {label:"EPLEY",    val:exBest.orm.epley},
                  {label:"BRZYCKI",  val:exBest.orm.brzycki},
                  {label:"LOMBARDI", val:exBest.orm.lombardi},
                  {label:"MAYHEW",   val:exBest.orm.mayhew},
                ].map(f=>(
                  <div key={f.label} style={{background:"#0a1628",borderRadius:"8px",padding:"8px",textAlign:"center"}}>
                    <div style={{fontSize:"9px",color:"#6b82a8",letterSpacing:"0.08em",marginBottom:"3px"}}>{f.label}</div>
                    <div style={{fontSize:"18px",color:"#f0f4ff"}}>{f.val}</div>
                  </div>
                ))}
              </div>
              {/* Percentage table for logged exercise */}
              <div style={{marginTop:"14px",borderTop:"1px solid #1e3560",paddingTop:"12px"}}>
                <div style={{fontSize:"11px",color:"#6b82a8",letterSpacing:"0.12em",marginBottom:"8px"}}>
                  TRAINING PERCENTAGES
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
                  {pctRows.map(pct=>(
                    <div key={pct} style={{display:"flex",justifyContent:"space-between",
                                           padding:"5px 8px",background:"#0a1628",borderRadius:"6px"}}>
                      <span style={{color:"#6b82a8",fontSize:"12px"}}>{pct}%</span>
                      <span style={{color:pct===100?"#c9a84c":"#f0f4ff",fontSize:"12px"}}>
                        {Math.round(exBest.orm.avg * pct / 100)} lbs
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      )}

      {/* Info card */}
      <div style={{...S.card,padding:"12px 16px"}}>
        <div style={{fontSize:"11px",color:"#6b82a8",letterSpacing:"0.1em",marginBottom:"6px"}}>ABOUT 1RM ESTIMATES</div>
        <div style={{fontSize:"11px",color:"#6b82a8",fontFamily:"Georgia,serif",letterSpacing:0,lineHeight:1.6}}>
          Most accurate with 3–10 reps. The average of 4 formulas (Epley, Brzycki, Lombardi, Mayhew) gives a reliable estimate. Use training percentages to plan working sets — e.g. 80% for hypertrophy, 90%+ for strength.
        </div>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [workouts,  setWorkouts]  = useState([]);
  const [templates, setTemplates] = useState([]);
  const [loaded,    setLoaded]    = useState(false);
  const [view,      setView]      = useState("home");
  const [workout,   setWorkout]   = useState(null);

  // Load from IndexedDB
  useEffect(()=>{
    (async()=>{
      try { const d=await dbGet("workouts");  if(d) setWorkouts(d);  } catch{}
      try { const d=await dbGet("templates"); if(d) setTemplates(d); } catch{}
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{ if(loaded) dbSet("workouts",  workouts).catch(()=>{}); },[workouts,  loaded]);
  useEffect(()=>{ if(loaded) dbSet("templates", templates).catch(()=>{}); },[templates, loaded]);

  const startWorkout = () => {
    const w=newWorkout(); w.name=`Workout ${workouts.length+1}`;
    setWorkout(w); setView("log");
  };
  const startFromTemplate = (t) => {
    const w=newWorkout();
    w.name=t.name;
    w.exercises=t.exercises.map(e=>({...e,id:uid(),sets:e.sets.map(s=>({...s,id:uid(),weight:"",reps:"",comment:""}))}));
    setWorkout(w); setView("log");
  };
  const saveWorkout = () => {
    setWorkouts(p=>p.find(x=>x.id===workout.id)?p.map(x=>x.id===workout.id?workout:x):[workout,...p]);
    setView("home"); setWorkout(null);
  };
  const deleteWorkout = id => setWorkouts(p=>p.filter(w=>w.id!==id));

  const onNav = (tab) => {
    if (tab==="log") { startWorkout(); return; }
    if (view==="log" && workout && tab!=="log") { /* just switch view, keep workout */ }
    setView(tab);
  };

  if (!loaded) return (
    <div style={{minHeight:"100vh",background:"#0a1628",display:"flex",flexDirection:"column",
                 alignItems:"center",justifyContent:"center",
                 fontFamily:"'Bebas Neue',Impact,sans-serif"}}>
      <BarbellSVG size={52}/>
      <div style={{color:"#c9a84c",fontSize:"26px",letterSpacing:"0.2em",marginTop:"18px"}}>IRON LOG</div>
      <div style={{color:"#6b82a8",fontSize:"12px",letterSpacing:"0.2em",marginTop:"8px"}}>LOADING…</div>
    </div>
  );

  const activeView = view==="log" && !workout ? "home" : view;

  return (
    <div style={S.app}>
      {activeView!=="log" && <Header/>}
      <BottomNav view={activeView} onNav={onNav}/>
      {activeView==="home"      && <HomeView workouts={workouts} templates={templates} onStart={startWorkout} onStartFromTemplate={startFromTemplate}/>}
      {activeView==="log"       && workout && <LogView workout={workout} setWorkout={setWorkout} workouts={workouts} onSave={saveWorkout} onCancel={()=>{setWorkout(null);setView("home");}}/>}
      {activeView==="history"   && <HistoryView workouts={workouts} onDelete={deleteWorkout}/>}
      {activeView==="progress"  && <ProgressView workouts={workouts}/>}
      {activeView==="orm"       && <ORMView workouts={workouts}/>}
      {activeView==="templates" && <TemplatesView templates={templates} setTemplates={setTemplates} onStartFromTemplate={startFromTemplate}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
